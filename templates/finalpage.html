<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Spro Deal – Wallet Updated</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #4cc414;
      --white: #ffffff;
      --bg: #f0f0f0;
      --text: #1a1a1a;
      --muted: #777;
    }
    body {
      font-family: 'Poppins', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }
    .phone-frame {
      width: 100%;
      max-width: 400px;
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .banner {
      background: var(--green);
      padding: 52px 24px 60px;
      text-align: center;
      clip-path: ellipse(120% 100% at 50% 0%);
      flex-shrink: 0;
    }
    .brand-name {
      color: var(--white);
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 0.3px;
    }
    .content {
      flex: 1;
      padding: 0 20px 32px;
      margin-top: -28px;
    }
    .success-card {
      background: var(--white);
      border-radius: 18px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.09);
      padding: 44px 28px 40px;
      text-align: center;
    }
    .check-wrap { margin-bottom: 20px; }
    .check-wrap svg { width: 64px; height: 64px; }
    .success-title {
      font-size: 19px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 10px;
      line-height: 1.3;
    }
    .success-sub {
      font-size: 13px;
      font-weight: 400;
      color: var(--muted);
      margin-bottom: 18px;
    }
    .redirect-text {
      font-size: 13.5px;
      font-weight: 700;
      color: var(--text);
    }
  </style>
</head>
<body>
  <div class="phone-frame">
    <div class="banner">
      <div class="brand-name">Spro Deal</div>
    </div>
    <div class="content">
      <div class="success-card">
        <div class="check-wrap">
          <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M10 34 L26 50 L54 18" stroke="#4cc414" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="success-title">Wallet Successfully Updated</div>
        <div class="success-sub">Your transaction has been processed securely.</div>
        <div class="redirect-text">Redirecting in <span id="counter">3</span> seconds...</div>
      </div>
    </div>
  </div>

  <script>
    let count = 3;
    const el = document.getElementById('counter');
    const interval = setInterval(() => {
      count--;
      if (count <= 0) {
        clearInterval(interval);
        el.textContent = '0';
        window.location.href = "{% url 'signup' %}";
      } else {
        el.textContent = count;
      }
    }, 1000);
  </script>
</body>
</html>
